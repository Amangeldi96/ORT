<!DOCTYPE html>
<html lang="ky">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/Logo2.png">
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Кирүү жана Катталуу</title>
  </head>
  <body>
    <div class="container">
      <div class="forms-container">
        <div class="signin-signup">
          
          <form action="#" class="sign-in-form">
  <h2 class="title">Кирүү</h2>
  <div class="input-field">
    <i class="fas fa-envelope"></i>
    <input type="email" id="in-email" placeholder="Email дарегиңиз" required />
  </div>
  <div class="input-field">
    <i class="fas fa-lock"></i>
    <input type="password" id="in-password" placeholder="Пароль" required />
  </div>
  <input type="submit" value="Кирүү" class="btn solid" />
</form>

<form action="#" class="sign-up-form">
  <h2 class="title">Катталуу</h2>
  <div class="input-field">
    <i class="fas fa-user"></i>
    <input type="text" id="up-name" placeholder="Аты-жөнүңүз" required />
  </div>
  <div class="input-field">
    <i class="fas fa-envelope"></i>
    <input type="email" id="up-email" placeholder="Email дарегиңиз" required />
  </div>
  <div class="input-field">
    <i class="fas fa-briefcase"></i>
    <input type="text" id="up-kesip" placeholder="Максаттуу кесибиңиз" required />
  </div>
  <div class="input-field">
    <i class="fas fa-lock"></i>
    <input type="password" id="up-password" placeholder="Пароль" required />
  </div>
  <input type="submit" class="btn" value="Катталуу" />
</form>


        </div>
      </div>

      <div class="panels-container">
        <div class="panel left-panel">
          <div class="content">
            <h3>Аккаунтуңуз жокпу?</h3>
            <p>Катталуу үчүн төмөнкү баскычты басыңыз</p>
            <button class="btn transparent" id="sign-up-btn">Катталуу</button>
          </div>
        </div>
        <div class="panel right-panel">
          <div class="content">
            <h3>Аккаунтуңуз барбы?</h3>
            <p>Кирүү үчүн бул жерди басыңыз</p>
            <button class="btn transparent" id="sign-in-btn">Кирүү</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
