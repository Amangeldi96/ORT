<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
}

body{
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    padding-bottom:100px;
    background-image: url('Fon2.png');
    background-size: cover;
    background-position: top center; /* Сүрөттү жогору жакка бекитет */
    background-repeat: no-repeat;
}

/* ===== IOS GLASS NAVBAR ===== */

.navbar{
    position:fixed;
    left:0px;
    right:0px;
    bottom:0px;

    height:72px;

    display:flex;
    justify-content:space-around;
    align-items:center;

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);

    border:1px solid rgba(255,255,255,.8);

  

    box-shadow:
    0 8px 30px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);

    z-index:9999;
}

.navbar::before{
    content:"";
    position:absolute;

    top:0;
    left:20px;
    right:20px;

    height:1px;

    background:rgba(255,255,255,.95);
}

/* ===== MENU ITEM ===== */

.nav-item{
    position:relative;

    width:58px;
    height:58px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    color:#1f2937;

    transition:.25s ease;
}

.nav-item svg{
    width:28px;
    height:28px;

    stroke:currentColor;
    stroke-width:1.6;
    fill:none;

    transition:.25s ease;
}

.nav-item.active{
    color:#0A84FF;
}

.nav-item.active svg{
    transform:scale(1.05);
}

.nav-item.active::after{
    content:"";

    position:absolute;

    bottom:5px;

    width:5px;
    height:5px;

    border-radius:50%;

    background:#0A84FF;
}

.nav-item:active{
    transform:scale(.9);
}
</style>
</head>

<body>

<!-- Контент -->

<nav class="navbar">

    <!-- Home -->
    <a href="#" class="nav-item active" onclick="setActive(this)">
        <svg viewBox="0 0 24 24">
            <path d="M3 10L12 3L21 10"/>
            <path d="M5 9V21H19V9"/>
        </svg>
    </a>

    <!-- Book -->
    <a href="#" class="nav-item" onclick="setActive(this)">
        <svg viewBox="0 0 24 24">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20V22H6.5A2.5 2.5 0 0 1 4 19.5V4.5A2.5 2.5 0 0 1 6.5 2Z"/>
        </svg>
    </a>

    <!-- Info -->
    <a href="#" class="nav-item" onclick="setActive(this)">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 8V12"/>
            <path d="M12 16H12.01"/>
        </svg>
    </a>

    <!-- Profile -->
    <a href="#" class="nav-item" onclick="setActive(this)">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 21C4 17 7 15 12 15C17 15 20 17 20 21"/>
        </svg>
    </a>

</nav>

<script>
function setActive(el){

    document.querySelectorAll(".nav-item").forEach(item=>{
        item.classList.remove("active");
    });

    el.classList.add("active");
}
</script>

</body>
</html>
